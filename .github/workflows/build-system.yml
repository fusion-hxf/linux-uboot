name: 构建系统镜像

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: '构建模式'
        required: true
        type: choice
        options:
          - parallel
          - single
        default: 'parallel'
      system_types:
        description: '系统类型，逗号分隔'
        required: false
        default: 'ubuntu-server'
        type: string
      kernel_versions:
        description: '内核版本，默认 7.1，当前指向音频 bring-up 节点'
        required: false
        default: '7.1'
        type: string
      bootstrap_tools:
        description: '构建工具，逗号分隔'
        required: false
        default: 'mmdebstrap'
        type: string
      desktop_environments:
        description: 'Phosh 桌面变体'
        required: false
        default: 'phosh-core'
        type: string
      debian_versions:
        description: 'Debian 版本，逗号分隔'
        required: false
        default: 'trixie'
        type: string
      ubuntu_versions:
        description: 'Ubuntu 版本，逗号分隔'
        required: false
        default: 'resolute'
        type: string
      kernel_repository:
        description: '内核 deb Release 仓库，owner/repo 或 GitHub URL'
        required: false
        default: 'fusion-hxf/kernel-deb'
        type: string
      kernel_release_tag:
        description: '内核 deb Release tag，留空则使用 kernel-v<kernel_version>'
        required: false
        default: ''
        type: string
      publish_release:
        description: '构建完成后发布到 Release'
        required: true
        default: true
        type: boolean
      release_tag:
        description: '系统镜像 Release tag'
        required: false
        default: 'latest'
        type: string

env:
  HOSTNAME: xiaomi-raphael
  BOOT_IMG: xiaomi-k20pro-boot.img
  UBOOT_IMG: u-boot.img
  UBOOT_SAFE_IMG: u-boot-safe.img
  UBOOT_AUDIO_TEST_IMG: u-boot-audio-test.img
  UBOOT_VENUS_TEST_IMG: u-boot-venus-test.img
  UBOOT_BRINGUP_TEST_IMG: u-boot-bringup-test.img
  UBOOT_MANIFEST: u-boot-variants.tsv
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPPRESS_DEPRECATION_WARNINGS: true

permissions:
  contents: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      build_mode: ${{ steps.generate.outputs.build_mode }}
      single_system_type: ${{ steps.generate.outputs.single_system_type }}
      single_kernel_version: ${{ steps.generate.outputs.single_kernel_version }}
      single_os_version: ${{ steps.generate.outputs.single_os_version }}
    steps:
      - name: 生成构建矩阵
        id: generate
        env:
          INPUT_BUILD_MODE: ${{ inputs.build_mode || 'parallel' }}
          INPUT_SYSTEM_TYPES: ${{ inputs.system_types || 'ubuntu-server' }}
          INPUT_KERNEL_VERSIONS: ${{ inputs.kernel_versions || '7.1' }}
          INPUT_BOOTSTRAP_TOOLS: ${{ inputs.bootstrap_tools || 'mmdebstrap' }}
          INPUT_DESKTOP_ENVIRONMENTS: ${{ inputs.desktop_environments || 'phosh-core' }}
          INPUT_DEBIAN_VERSIONS: ${{ inputs.debian_versions || 'trixie' }}
          INPUT_UBUNTU_VERSIONS: ${{ inputs.ubuntu_versions || 'resolute' }}
        run: |
          set -Eeuo pipefail

          compact_csv() {
            local raw="${1:-$2}"
            raw="${raw//[[:space:]]/}"
            printf '%s' "$raw"
          }

          BUILD_MODE="$(compact_csv "$INPUT_BUILD_MODE" parallel)"
          SYS_TYPES="$(compact_csv "$INPUT_SYSTEM_TYPES" ubuntu-server)"
          KERN_VERS="$(compact_csv "$INPUT_KERNEL_VERSIONS" 7.1)"
          BOOT_TOOLS="$(compact_csv "$INPUT_BOOTSTRAP_TOOLS" mmdebstrap)"
          DESKTOP_ENV="$(compact_csv "$INPUT_DESKTOP_ENVIRONMENTS" phosh-core)"
          DEB_VERS="$(compact_csv "$INPUT_DEBIAN_VERSIONS" trixie)"
          UBU_VERS="$(compact_csv "$INPUT_UBUNTU_VERSIONS" resolute)"

          echo "build_mode=$BUILD_MODE" >> "$GITHUB_OUTPUT"

          IFS=',' read -ra SYS_ARRAY <<< "$SYS_TYPES"
          IFS=',' read -ra KERN_ARRAY <<< "$KERN_VERS"
          IFS=',' read -ra TOOL_ARRAY <<< "$BOOT_TOOLS"
          IFS=',' read -ra DEB_ARRAY <<< "$DEB_VERS"
          IFS=',' read -ra UBU_ARRAY <<< "$UBU_VERS"

          ITEMS_FILE="$(mktemp)"
          add_item() {
            jq -cn \
              --arg system_type "$1" \
              --arg kernel_version "$2" \
              --arg bootstrap_tool "$3" \
              --arg debian_version "$4" \
              --arg ubuntu_version "$5" \
              --arg desktop_env "$6" \
              '{system_type:$system_type,kernel_version:$kernel_version,bootstrap_tool:$bootstrap_tool,debian_version:$debian_version,ubuntu_version:$ubuntu_version,desktop_env:$desktop_env}' \
              >> "$ITEMS_FILE"
          }

          if [ "$BUILD_MODE" = "single" ]; then
            SYS_TYPE="${SYS_ARRAY[0]}"
            KERN_VER="${KERN_ARRAY[0]}"
            TOOL="${TOOL_ARRAY[0]}"
            if [[ "$SYS_TYPE" == debian-* ]]; then
              DEB_VER="${DEB_ARRAY[0]}"
              UBU_VER=""
              OS_VER="$DEB_VER"
            else
              DEB_VER=""
              UBU_VER="${UBU_ARRAY[0]}"
              OS_VER="$UBU_VER"
            fi
            add_item "$SYS_TYPE" "$KERN_VER" "$TOOL" "$DEB_VER" "$UBU_VER" "$DESKTOP_ENV"
            echo "single_system_type=$SYS_TYPE" >> "$GITHUB_OUTPUT"
            echo "single_kernel_version=$KERN_VER" >> "$GITHUB_OUTPUT"
            echo "single_os_version=$OS_VER" >> "$GITHUB_OUTPUT"
          else
            for sys in "${SYS_ARRAY[@]}"; do
              if [[ "$sys" == debian-* ]]; then
                for kern in "${KERN_ARRAY[@]}"; do
                  for tool in "${TOOL_ARRAY[@]}"; do
                    for deb_ver in "${DEB_ARRAY[@]}"; do
                      add_item "$sys" "$kern" "$tool" "$deb_ver" "" "$DESKTOP_ENV"
                    done
                  done
                done
              elif [[ "$sys" == ubuntu-* ]]; then
                for kern in "${KERN_ARRAY[@]}"; do
                  for tool in "${TOOL_ARRAY[@]}"; do
                    for ubu_ver in "${UBU_ARRAY[@]}"; do
                      add_item "$sys" "$kern" "$tool" "" "$ubu_ver" "$DESKTOP_ENV"
                    done
                  done
                done
              else
                echo "::error::不支持的系统类型: $sys"
                exit 1
              fi
            done
          fi

          [ -s "$ITEMS_FILE" ] || { echo "::error::构建矩阵为空"; exit 1; }
          MATRIX="$(jq -cs '.' "$ITEMS_FILE")"
          echo "Generated matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    needs: generate-matrix
    name: ${{ format('构建 {0}-{1}', matrix.system_type, matrix.kernel_version) }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    env:
      SYSTEM_TYPE: ${{ matrix.system_type }}
      KERNEL_VERSION: ${{ matrix.kernel_version }}
      BOOTSTRAP_TOOL: ${{ matrix.bootstrap_tool }}
      DESKTOP_ENV: ${{ matrix.desktop_env }}
      DEBIAN_VERSION: ${{ matrix.debian_version }}
      UBUNTU_VERSION: ${{ matrix.ubuntu_version }}
      KERNEL_REPO: ${{ inputs.kernel_repository || 'fusion-hxf/kernel-deb' }}
      KERNEL_RELEASE_TAG: ${{ inputs.kernel_release_tag || format('kernel-v{0}', matrix.kernel_version) }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装构建工具
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates curl unzip python3 dpkg p7zip-full e2fsprogs util-linux \
            android-sdk-libsparse-utils \
            mmdebstrap debootstrap debian-archive-keyring

      - name: 下载内核包、cache boot image 和 U-Boot
        run: |
          set -Eeuo pipefail
          chmod +x scripts/*.sh
          bash scripts/00-download-deps.sh "$KERNEL_VERSION" "$KERNEL_REPO"

      - name: 检查构建输入
        run: |
          set -Eeuo pipefail
          ls -lh "xiaomi-raphael-debs_${KERNEL_VERSION}"
          ls -lh xiaomi-k20pro-boot.img
          ls -lh u-boot.img u-boot-safe.img u-boot-audio-test.img \
            u-boot-venus-test.img u-boot-bringup-test.img u-boot-variants.tsv
          dpkg-deb -f "xiaomi-raphael-debs_${KERNEL_VERSION}/linux-image-xiaomi-raphael.deb" Package Version Architecture
          dpkg-deb -f "xiaomi-raphael-debs_${KERNEL_VERSION}/firmware-xiaomi-raphael.deb" Package Version Architecture
          dpkg-deb -f "xiaomi-raphael-debs_${KERNEL_VERSION}/alsa-xiaomi-raphael.deb" Package Version Architecture

      - name: 执行 rootfs 构建
        run: |
          set -Eeuo pipefail
          chmod +x build.sh scripts/*.sh
          sudo \
            BOOTSTRAP_TOOL="$BOOTSTRAP_TOOL" \
            DEBIAN_VERSION="$DEBIAN_VERSION" \
            UBUNTU_VERSION="$UBUNTU_VERSION" \
            KERNEL_RELEASE_TAG="$KERNEL_RELEASE_TAG" \
            REQUIRE_ALSA_DEB=1 \
            ./build.sh "$SYSTEM_TYPE" "$KERNEL_VERSION" "$DESKTOP_ENV"

      - name: 打包产物
        id: artifacts
        run: |
          set -Eeuo pipefail
          OS_VER="${DEBIAN_VERSION:-$UBUNTU_VERSION}"
          FILENAME="rootfs_${SYSTEM_TYPE}_${KERNEL_VERSION}_${OS_VER}"
          if [[ "$SYSTEM_TYPE" == *"phosh"* ]]; then
            FILENAME="${FILENAME}_${DESKTOP_ENV}"
          fi

          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$FILENAME" >> "$GITHUB_OUTPUT"

          UBOOT_FILES=(
            u-boot.img
            u-boot-safe.img
            u-boot-audio-test.img
            u-boot-venus-test.img
            u-boot-bringup-test.img
            u-boot-variants.tsv
          )
          sha256sum rootfs.img xiaomi-k20pro-boot.img "${UBOOT_FILES[@]}" \
            > "${FILENAME}.contents.sha256"
          7z a "${FILENAME}.7z" rootfs.img xiaomi-k20pro-boot.img "${UBOOT_FILES[@]}"
          sha256sum "${FILENAME}.7z" > "${FILENAME}.sha256"
          ls -lh "${FILENAME}.7z" "${FILENAME}.sha256" "${FILENAME}.contents.sha256"

      - name: 上传产物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifacts.outputs.artifact_name }}
          path: |
            ${{ steps.artifacts.outputs.filename }}.7z
            ${{ steps.artifacts.outputs.filename }}.sha256
            ${{ steps.artifacts.outputs.filename }}.contents.sha256
          retention-days: 7

      - name: 清理临时文件
        if: always()
        run: |
          sudo rm -rf rootdir 2>/dev/null || true
          sudo rm -rf xiaomi-raphael-debs_* 2>/dev/null || true
          sudo rm -f rootfs.img xiaomi-k20pro-boot.img \
            u-boot.img u-boot-safe.img u-boot-audio-test.img \
            u-boot-venus-test.img u-boot-bringup-test.img u-boot-variants.tsv \
            u-boot.img.zip 2>/dev/null || true

  release:
    needs: [generate-matrix, build]
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release
    name: 发布统一 Release
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rootfs_*
          merge-multiple: false

      - name: 生成 Release 描述和文件列表
        run: |
          set -Eeuo pipefail
          TIMESTAMP="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          RELEASE_DIR="release-files"
          SIZE_LIMIT=2147483648
          mkdir -p "$RELEASE_DIR"

          {
            echo "## Xiaomi Raphael 系统镜像"
            echo ""
            echo "构建时间: $TIMESTAMP"
            echo ""
            echo "默认账号:"
            echo "- user / 1234"
            echo "- root / 1234"
            echo ""
            echo "USB NCM: 172.16.42.1"
            echo ""
            echo "U-Boot/DTB 变体: safe、audio-test、venus-test、bringup-test；首次刷写请从 safe 开始。"
            echo ""
            echo "### 产物"
          } > release-notes.md

          found=0
          while IFS= read -r -d '' file; do
            found=1
            filename="$(basename "$file")"
            filesize="$(stat -c%s "$file")"
            sha_file="${file%.7z}.sha256"
            if [ -f "$sha_file" ]; then
              sha="$(awk 'NR==1 {print $1}' "$sha_file")"
            else
              sha="$(sha256sum "$file" | awk '{print $1}')"
            fi

            if [ "$filesize" -gt "$SIZE_LIMIT" ]; then
              echo "- $filename: ${filesize} bytes，超过 2GB，仅保留在 Artifacts，sha256=$sha" >> release-notes.md
            else
              ln -sf "$(realpath "$file")" "$RELEASE_DIR/$filename"
              echo "- $filename: ${filesize} bytes，sha256=$sha" >> release-notes.md
            fi
          done < <(find artifacts -type f -name '*.7z' -print0 | sort -z)

          [ "$found" -eq 1 ] || { echo "::error::没有找到 rootfs 产物"; exit 1; }
          echo "" >> release-notes.md
          echo "### 内核来源" >> release-notes.md
          echo "- kernel repository: ${{ inputs.kernel_repository || 'fusion-hxf/kernel-deb' }}" >> release-notes.md
          echo "- kernel release tag: ${{ inputs.kernel_release_tag || 'kernel-v<kernel_version>' }}" >> release-notes.md

          cat release-notes.md
          ls -la "$RELEASE_DIR"

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || 'latest' }}
          name: "Xiaomi Raphael 系统镜像"
          body_path: release-notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: release-files/*.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
