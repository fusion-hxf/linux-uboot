name: 构建 U-Boot (含音频 DTB)

# 手动触发：交叉编译 U-Boot，从内核 deb 抽取带音频的 DTB 追加进 boot image，发布到 Release
on:
  workflow_dispatch:
    inputs:
      uboot_repo:
        description: 'U-Boot 源码仓库'
        required: false
        default: 'https://github.com/fusion-hxf/u-boot.git'
        type: string
      uboot_ref:
        description: 'U-Boot 分支/标签 (留空=默认分支)'
        required: false
        default: ''
        type: string
      kernel_deb_url:
        description: '内核 deb 下载地址 (用于抽取 sm8150-xiaomi-raphael.dtb)'
        required: false
        default: 'https://github.com/fusion-hxf/kernel-deb/releases/download/kernel-v7.1/linux-image-xiaomi-raphael.deb'
        type: string
      kernel_version:
        description: '版本号 (用于 Release 命名)'
        required: false
        default: '7.1'
        type: string
      pagesize:
        description: 'boot image 页大小 (复刻 GengWei v1.0.0 = 4096，勿改)'
        required: false
        default: '4096'
        type: string
      base_addr:
        description: 'boot image base 地址 (复刻 GengWei v1.0.0 = 0x0，勿随意改)'
        required: false
        default: '0x0'
        type: string

jobs:
  build-uboot:
    runs-on: ubuntu-24.04-arm      # ARM runner：原生编译 u-boot，无需交叉工具链
    permissions:
      contents: write              # 允许创建 Release
    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          # 原生 aarch64 编译，只需常规构建依赖；打包用纯 stdlib python，无需 mkbootimg/pip
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev device-tree-compiler \
            python3 python3-dev python3-setuptools swig uuid-dev gzip wget dpkg

      - name: 克隆 U-Boot 源码
        run: |
          if [ -n "${{ inputs.uboot_ref }}" ]; then
            git clone --depth 1 --branch "${{ inputs.uboot_ref }}" "${{ inputs.uboot_repo }}" u-boot
          else
            git clone --depth 1 "${{ inputs.uboot_repo }}" u-boot
          fi
          ( cd u-boot && git log --oneline -1 )

      - name: 下载内核 deb 并抽取 DTB
        run: |
          wget -O linux-image.deb "${{ inputs.kernel_deb_url }}"
          dpkg-deb -x linux-image.deb kdeb
          DTB=$(find kdeb -name 'sm8150-xiaomi-raphael.dtb' | head -1)
          if [ -z "$DTB" ]; then
            echo "::error::deb 中未找到 sm8150-xiaomi-raphael.dtb"; find kdeb -name '*.dtb'; exit 1
          fi
          cp "$DTB" raphael.dtb
          echo "DTB = $DTB ($(stat -c%s raphael.dtb) bytes)"

      - name: 编译 U-Boot (qcom 手机配置，原生 aarch64)
        run: |
          cd u-boot
          make O=.output qcom_defconfig qcom-phone.config
          make O=.output -j"$(nproc)"
          ls -la .output/u-boot-nodtb.bin

      - name: 追加 DTB 并打包 boot image (纯 stdlib python，逐字节复刻 GengWei v1.0.0 格式)
        env:
          PAGESIZE: ${{ inputs.pagesize }}
          BASE: ${{ inputs.base_addr }}
        run: |
          cd u-boot
          gzip -kf .output/u-boot-nodtb.bin
          cat .output/u-boot-nodtb.bin.gz ../raphael.dtb > .output/u-boot-nodtb.bin.gz-dtb
          # Android boot image v0：header(1页) + kernel(页对齐)，无 ramdisk/second/cmdline。
          # 实测 GengWei v1.0.0：base=0x0, kernel@0x8000, ramdisk@0x1000000, second@0xf00000, tags@0x100。
          # 本脚本已离线验证可与该镜像逐字节一致（含 sha1 id）。
          python3 - .output/u-boot-nodtb.bin.gz-dtb ../u-boot.img <<'PY'
          import struct, hashlib, sys, os
          kernel = open(sys.argv[1], 'rb').read()
          out    = sys.argv[2]
          page = int(os.environ.get('PAGESIZE', '4096'), 0)
          base = int(os.environ.get('BASE', '0x0'), 0)
          kaddr, raddr, saddr, tags = base+0x8000, base+0x1000000, base+0xf00000, base+0x100
          def pad(b):
              r = len(b) % page
              return b + b'\x00'*(page-r) if r else b
          sha = hashlib.sha1()
          for blob, size in ((kernel, len(kernel)), (b'', 0), (b'', 0)):
              sha.update(blob); sha.update(struct.pack('<I', size))
          img_id = sha.digest()
          hdr  = b'ANDROID!'
          hdr += struct.pack('<10I', len(kernel), kaddr, 0, raddr, 0, saddr, tags, page, 0, 0)
          hdr += b'\x00'*16 + b'\x00'*512                      # name + cmdline
          hdr += img_id + b'\x00'*(32-len(img_id))             # id[8]
          hdr += b'\x00'*1024                                  # extra_cmdline
          open(out, 'wb').write(pad(hdr) + pad(kernel))
          print('wrote %s: %d bytes (kernel %d)' % (out, os.path.getsize(out), len(kernel)))
          PY
          ls -la ../u-boot.img

      - name: 获取构建时间
        id: ts
        run: echo "timestamp=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: uboot-v${{ inputs.kernel_version }}
          name: "xiaomi raphael U-Boot (含音频 DTB) v${{ inputs.kernel_version }}"
          body: |
            U-Boot 镜像，已把带音频的 sm8150-xiaomi-raphael DTB 追加进 boot image。
            - U-Boot 源: ${{ inputs.uboot_repo }} @ ${{ inputs.uboot_ref || '默认分支' }}
            - DTB 来源: ${{ inputs.kernel_deb_url }}
            - 构建时间: ${{ steps.ts.outputs.timestamp }}

            刷写：
            ```
            fastboot flash boot u-boot.img
            fastboot erase dtbo
            ```
            打包参数已按 GengWei v1.0.0 现用镜像实测复刻
            (header_version=0, base=0x0, pagesize=4096, kernel@0x8000)。
          draft: false
          prerelease: false
          files: u-boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-raphael-v${{ inputs.kernel_version }}
          path: u-boot.img
