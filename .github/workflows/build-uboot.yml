name: 重打包 U-Boot (已知可用二进制 + 内核 DTB)

# 暂不从源码编译 U-Boot。复用已验证可启动的 GengWei v1.0.0 u-boot.gz，
# 仅替换其追加 DTB；这样与系统镜像构建使用同一条可回退流程。
on:
  workflow_dispatch:
    inputs:
      kernel_deb_url:
        description: 'linux-image deb 下载地址（必须包含四份 Raphael DTB）'
        required: false
        default: 'https://github.com/fusion-hxf/kernel-deb/releases/download/kernel-v7.1/linux-image-xiaomi-raphael.deb'
        type: string
      base_uboot_url:
        description: '已知可启动的 U-Boot zip'
        required: false
        default: 'https://github.com/GengWei1997/linux-xiaomi-raphael-uboot/releases/download/v1.0.0/u-boot-sm8150-xiaomi-raphael.img.zip'
        type: string
      kernel_version:
        description: '版本号（用于 Release 命名）'
        required: false
        default: '7.1'
        type: string

jobs:
  repack-uboot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出重打包脚本
        uses: actions/checkout@v5

      - name: 安装依赖
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl unzip python3 dpkg device-tree-compiler

      - name: 下载 U-Boot 和内核 deb
        env:
          KERNEL_DEB_URL: ${{ inputs.kernel_deb_url }}
          BASE_UBOOT_URL: ${{ inputs.base_uboot_url }}
        run: |
          set -Eeuo pipefail
          curl -fL --retry 5 --retry-delay 2 -o linux-image.deb "$KERNEL_DEB_URL"
          curl -fL --retry 5 --retry-delay 2 -o u-boot-base.zip "$BASE_UBOOT_URL"
          unzip -tq u-boot-base.zip
          member="$(unzip -Z1 u-boot-base.zip | awk '/(^|\/)u-boot\.img$/ { print; exit }')"
          [ -n "$member" ] || { echo '::error::zip 中未找到 u-boot.img'; exit 1; }
          unzip -p u-boot-base.zip "$member" > u-boot-base.img
          dpkg-deb -x linux-image.deb kernel-root
          dpkg-deb -f linux-image.deb Package Version Architecture

      - name: 生成安全版和三份实验版
        env:
          BASE_UBOOT_URL: ${{ inputs.base_uboot_url }}
        run: |
          set -Eeuo pipefail
          DTBS=(
            sm8150-xiaomi-raphael.dtb
            sm8150-xiaomi-raphael-audio-test.dtb
            sm8150-xiaomi-raphael-venus-test.dtb
            sm8150-xiaomi-raphael-bringup-test.dtb
          )
          VARIANTS=(safe audio-test venus-test bringup-test)
          EXPECTED_COMPATIBLES=(
            xiaomi,raphael
            xiaomi,raphael-audio-test
            xiaomi,raphael-venus-test
            xiaomi,raphael-bringup-test
          )
          OUTPUTS=(
            u-boot.img
            u-boot-audio-test.img
            u-boot-venus-test.img
            u-boot-bringup-test.img
          )

          {
            echo 'format=raphael-uboot-variants-v2'
            echo "base_uboot_url=$BASE_UBOOT_URL"
            echo "base_uboot_sha256=$(sha256sum u-boot-base.img | awk '{print $1}')"
            printf 'variant\tdtb\tfirst_compatible\tdtb_sha256\timage\timage_sha256\n'
          } > u-boot-variants.tsv

          for i in "${!DTBS[@]}"; do
            dtb="$(find kernel-root -type f -name "${DTBS[$i]}" -print -quit)"
            [ -n "$dtb" ] || {
              echo "::error::内核 deb 中未找到 ${DTBS[$i]}"
              find kernel-root -type f -name 'sm8150-xiaomi-raphael*.dtb' -print
              exit 1
            }
            first_compatible="$(fdtget -t s "$dtb" / compatible | awk '{print $1}')"
            [ "$first_compatible" = "${EXPECTED_COMPATIBLES[$i]}" ] || {
              echo "::error::${DTBS[$i]} 首个 compatible 为 $first_compatible，期望 ${EXPECTED_COMPATIBLES[$i]}"
              exit 1
            }
            python3 repack-uboot.py u-boot-base.img "$dtb" "${OUTPUTS[$i]}"
            printf '%s\t%s\t%s\t%s\t%s\t%s\n' \
              "${VARIANTS[$i]}" "${DTBS[$i]}" "$first_compatible" \
              "$(sha256sum "$dtb" | awk '{print $1}')" "${OUTPUTS[$i]}" \
              "$(sha256sum "${OUTPUTS[$i]}" | awk '{print $1}')" \
              >> u-boot-variants.tsv
          done

          cp u-boot.img u-boot-safe.img
          sha256sum u-boot.img u-boot-safe.img u-boot-audio-test.img \
            u-boot-venus-test.img u-boot-bringup-test.img > u-boot-images.sha256
          ls -lh u-boot*.img u-boot-variants.tsv u-boot-images.sha256

      - name: 获取构建时间
        id: ts
        run: echo "timestamp=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: uboot-v${{ inputs.kernel_version }}
          name: "xiaomi raphael 可回退 U-Boot/DTB v${{ inputs.kernel_version }}"
          body: |
            本 Release 不编译新的 U-Boot；它复用已知可启动的 GengWei v1.0.0
            U-Boot 二进制，只从内核 deb 提取 DTB 并重新追加。

            - safe: `u-boot.img` / `u-boot-safe.img`
            - 音频单项: `u-boot-audio-test.img`
            - Venus 单项: `u-boot-venus-test.img`
            - 组合项: `u-boot-bringup-test.img`（仅在两个单项都通过后使用）
            - DTB 来源: ${{ inputs.kernel_deb_url }}
            - U-Boot 来源: ${{ inputs.base_uboot_url }}
            - 构建时间: ${{ steps.ts.outputs.timestamp }}

            首次刷写必须从 safe 开始，并保留其副本用于回退。
          draft: false
          prerelease: false
          files: |
            u-boot.img
            u-boot-safe.img
            u-boot-audio-test.img
            u-boot-venus-test.img
            u-boot-bringup-test.img
            u-boot-variants.tsv
            u-boot-images.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-raphael-variants-v${{ inputs.kernel_version }}
          path: |
            u-boot.img
            u-boot-safe.img
            u-boot-audio-test.img
            u-boot-venus-test.img
            u-boot-bringup-test.img
            u-boot-variants.tsv
            u-boot-images.sha256
